name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: gradle build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: pvp-fps-mod
          path: build/libs/*.jar
